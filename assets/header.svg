<svg width="100%" viewBox="0 0 854 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sadia Ahmad, AI Undergrad at NUST">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050b2e"/>
      <stop offset="55%" stop-color="#0a1a4f"/>
      <stop offset="100%" stop-color="#12307a"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b2f6e"/>
      <stop offset="100%" stop-color="#24418f"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#122253"/>
      <stop offset="100%" stop-color="#1a3170"/>
    </linearGradient>
    <linearGradient id="shoot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="854" height="220" fill="url(#nightSky)"/>

  <!-- Twinkling stars -->
  <g fill="#ffffff">
    <circle cx="40" cy="30" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="95" cy="70" r="1"><animate attributeName="opacity" values="1;0.15;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="25" r="1.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="90" r="1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="40" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="20" r="1"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="65" r="1.5"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.7s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="30" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="85" r="1.3"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="45" r="1"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="2.5s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="590" cy="20" r="1.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="75" r="1"><animate attributeName="opacity" values="1;0.15;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="35" r="1.2"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="60" r="1.5"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.3s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="815" cy="28" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="120" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="140" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="130" r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="110" r="1.3"><animate attributeName="opacity" values="0.9;0.25;0.9" dur="3.4s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="55" r="0.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="505" cy="15" r="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.8s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="105" r="0.9"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.7s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Bigger sparkle stars (4-point) -->
  <g fill="#ffffff">
    <path d="M300 100 l2 6 6 2 -6 2 -2 6 -2-6 -6-2 6-2 z">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M560 115 l1.8 5.5 5.5 1.8 -5.5 1.8 -1.8 5.5 -1.8-5.5 -5.5-1.8 5.5-1.8 z">
      <animate attributeName="opacity" values="1;0.2;1" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M745 85 l1.5 4.5 4.5 1.5 -4.5 1.5 -1.5 4.5 -1.5-4.5 -4.5-1.5 4.5-1.5 z">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M105 95 l1.5 4.5 4.5 1.5 -4.5 1.5 -1.5 4.5 -1.5-4.5 -4.5-1.5 4.5-1.5 z">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Shooting star -->
  <g opacity="0">
    <line x1="-60" y1="0" x2="0" y2="0" stroke="url(#shoot)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff"/>
    <animateTransform attributeName="transform" type="translate" from="120 20" to="520 95" dur="1.6s" begin="2s;shootFade.end+5s" id="shootMove"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.7;1" dur="1.6s" begin="2s;shootFade.end+5s" id="shootFade"/>
  </g>

  <!-- Soft glow behind the name -->
  <ellipse cx="427" cy="95" rx="240" ry="60" fill="url(#glow)" opacity="0.10"/>

  <!-- Text -->
  <text x="427" y="105" text-anchor="middle" fill="#ffffff"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="700" letter-spacing="2">
    Sadia Ahmad
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>
  <text x="427" y="140" text-anchor="middle" fill="#aebdf2"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" letter-spacing="3">
    AI Undergrad @ NUST
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;1" dur="2.2s" fill="freeze"/>
  </text>

  <!-- Waves at the bottom (capsule-render style) -->
  <path fill="url(#wave2)" opacity="0.7"
        d="M0 185 C 110 160, 210 205, 320 188 C 430 171, 530 205, 640 190 C 730 178, 800 195, 854 183 L 854 220 L 0 220 Z"/>
  <path fill="url(#wave1)"
        d="M0 200 C 120 178, 220 215, 340 200 C 460 185, 560 215, 680 202 C 760 194, 820 208, 854 198 L 854 220 L 0 220 Z"/>
</svg>
